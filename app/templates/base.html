<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Event-Job-Planer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Lokale Planung</p>
        <h1>Event-Job-Planer</h1>
      </div>
      <nav class="topnav" aria-label="Bereiche">
        <a href="#events">Events</a>
        <a href="#archive">Job-Archiv</a>
        <a href="#google-calendar">Kalender</a>
        <a href="#inventory">Inventar</a>
        <a href="#personnel">Personal</a>
      </nav>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-stack" role="status" aria-live="polite">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
