<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Event-Job-Planer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <script src="{{ url_for('static', filename='collapsible-state.js') }}" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Lokale Planung</p>
        <h1>Event-Job-Planer</h1>
      </div>
      <details class="menu-shell">
        <summary class="menu-button" aria-label="Menü öffnen">
          <span></span>
          <span></span>
          <span></span>
        </summary>
        <nav class="menu-panel" aria-label="Bereiche">
          <a href="{{ url_for('main.index') }}#events">Events</a>
          <a href="{{ url_for('main.index') }}#archive">Job-Archiv</a>
          <a href="{{ url_for('main.inventory') }}">Inventar</a>
          <a href="{{ url_for('main.index') }}#personnel">Personal</a>
          <a href="{{ url_for('main.settings') }}">Einstellungen</a>
        </nav>
      </details>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-stack" role="status" aria-live="polite">
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
