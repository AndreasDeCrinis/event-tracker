{% macro action_icon(name) %}
  {% if name == "save" %}
    <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
      <path d="M20 6 9 17l-5-5"></path>
    </svg>
  {% elif name == "remove" %}
    <svg class="button-icon" aria-hidden="true" viewBox="0 0 24 24" focusable="false">
      <path d="M18 6 6 18"></path>
      <path d="m6 6 12 12"></path>
    </svg>
  {% endif %}
{% endmacro %}
